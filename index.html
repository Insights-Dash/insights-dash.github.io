<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Insights Dash</title>

  <meta
    name="description"
    content="Insights Dash is an integration application for Google platform services."
  />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f1115;
      color: #f5f5f5;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    h2 {
      margin-top: 48px;
      color: #ffffff;
    }

    p {
      color: #cfcfcf;
      font-size: 1.05rem;
    }

    .card {
      background: #171a21;
      border-radius: 14px;
      padding: 24px;
      margin-top: 24px;
    }

    a {
      color: #7ab7ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid #2b2f39;
      color: #9da3af;
      font-size: 0.95rem;
    }

    .links {
      margin-top: 16px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      background: #202632;
      color: #8ab4ff;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      margin-bottom: 18px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="badge">
      Kane Ink
    </div>

    <h1>Kane Ink</h1>

    <p>
      Kane Ink is an integration application for Google platform services.
    </p>

    <div class="card">
      <h2>Privacy & Terms</h2>

      <div class="links">
        <a href="https://insights-dash.github.io/privacy-policy.html">
          Privacy Policy
        </a>

        <a href="https://insights-dash.github.io/terms-of-service.html">
          Terms of Service
        </a>
      </div>
    </div>

    <div class="card">
      <h2>Contact</h2>

      <p>
        <a href="mailto:contact@chanah.dev">
          contact@chanah.dev
        </a>
      </p>
    </div>

    <footer>
      © 2026 Kane Ink. All rights reserved.
    </footer>

  </div>
</body>
</html>
